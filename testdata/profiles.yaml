work_kinds:
  - name: journal_article
    fields:
      - name: titles
        required: always
      - name: abstracts
      - name: identifiers
        schemes: [doi, issn]
      - name: journal_title
        required: public
      - name: publication_year
        required: public
      - name: volume
      - name: issue
      - name: pages
      - name: contributors

  - name: book
    fields:
      - name: titles
        required: always
      - name: identifiers
        schemes: [isbn, doi]
      - name: publication_year
        required: public
      - name: publisher
      - name: contributors

person:
  fields:
    - name: name
      required: always
    - name: given_name
    - name: family_name
    - name: identifiers
    - name: affiliations

project:
  fields:
    - name: titles
      required: always
    - name: descriptions
    - name: identifiers
    - name: participants

organization_kinds:
  - name: department
    fields:
      - name: names
        required: public
      - name: identifiers
      - name: rels
